<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAH 250 | Immersive Archive</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="img-list.js"></script> 
    <style>
        :root { 
            --apple-blue: #007AFF; 
            --card-w: 66vw; 
            --glass: rgba(10, 10, 12, 0.75);
        }
        
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            color: white; 
            -webkit-font-smoothing: antialiased;
        }

        /* 1. 悬浮胶囊导航 */
        #nav-container {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 2000;
        }
        .nav-capsule {
            background: rgba(25, 25, 28, 0.5); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 30px;
            padding: 12px 35px; display: flex; gap: 45px; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .nav-item { font-size: 11px; font-weight: 600; letter-spacing: 2px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active, .nav-item:hover { opacity: 1; color: var(--apple-blue); }

        /* 2. 地球容器 */
        #globeViz { 
            width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; 
            background: radial-gradient(circle at center, #1a1a1c 0%, #000000 100%); 
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        body.card-open #globeViz { transform: translateX(-10%); }

        /* 3. 巨幕侧边面板 */
        #card {
            position: fixed; right: calc(-1 * var(--card-w)); top: 0; bottom: 0; width: var(--card-w);
            background: var(--glass); backdrop-filter: blur(60px) saturate(210%);
            -webkit-backdrop-filter: blur(60px) saturate(210%);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 100px 8% 60px 8%; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); 
            z-index: 1500; display: flex; flex-direction: column; overflow-y: auto; box-sizing: border-box;
        }
        #card.active { right: 0; }
        #card-img { width: 100%; max-height: 55vh; object-fit: contain; background: rgba(0,0,0,0.2); border-radius: 24px; margin-bottom: 50px; box-shadow: 0 30px 80px rgba(0,0,0,0.8); }
        #card-title { font-size: clamp(32px, 5vw, 60px); font-weight: 800; margin: 0; letter-spacing: -2px; line-height: 1.1; }
        #card-subtitle { color: var(--apple-blue); font-size: 14px; margin-top: 15px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }
        #card-detail { font-size: 18px; opacity: 0.6; line-height: 1.7; margin-top: 40px; max-width: 750px; }

        .close-trigger { position: absolute; top: 40px; right: 8%; cursor: pointer; font-size: 24px; opacity: 0.3; transition: 0.3s; z-index: 10; }
        .close-trigger:hover { opacity: 1; }

        /* 4. 时间轴视图 */
        #timeline-view {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: none; z-index: 1800; padding: 140px 10%;
            box-sizing: border-box; overflow-y: auto;
        }
        .timeline-container { border-left: 2px solid var(--apple-blue); padding-left: 40px; margin-top: 60px; }
        .timeline-item { position: relative; margin-bottom: 60px; cursor: pointer; transition: 0.3s; }
        .timeline-item:hover { transform: translateX(10px); }
        .timeline-dot { 
            position: absolute; left: -46px; top: 8px; width: 10px; height: 10px; 
            background: var(--apple-blue); border-radius: 50%; box-shadow: 0 0 15px var(--apple-blue);
        }
    </style>
</head>
<body>

    <div id="nav-container">
        <div class="nav-capsule">
            <div id="nav-explore" class="nav-item active" onclick="switchMode('explore')">EXPLORE</div>
            <div id="nav-timeline" class="nav-item" onclick="switchMode('timeline')">CHRONICLE</div>
            <div class="nav-item" style="cursor: not-allowed; opacity: 0.1;">ASSESSMENT</div>
        </div>
    </div>

    <div id="globeViz"></div>

    <div id="card">
        <div class="close-trigger" onclick="closeCard()">✕</div>
        <img id="card-img" src="" alt="Artwork">
        <div class="card-content">
            <h2 id="card-title"></h2>
            <div id="card-subtitle"></div>
            <p id="card-detail"></p>
        </div>
    </div>

    <div id="timeline-view">
        <h1 style="font-size: 64px; font-weight: 800; letter-spacing: -3px; margin: 0;">The Chronicle</h1>
        <div id="timeline-content" class="timeline-container"></div>
    </div>

    <script>
        let APAH_DATA = [];
        let APAH_IMG_MAP = {}; // 用于快速查询编号对应的图片列表

        // --- 核心逻辑：解析 img-list.js 中的数组 ---
        function initializeImageMap() {
            if (typeof imageFiles !== 'undefined') {
                imageFiles.forEach(filename => {
                    // 提取开头的数字（前缀匹配）
                    const match = filename.match(/^(\d+)/);
                    if (match) {
                        const id = parseInt(match[1]);
                        if (!APAH_IMG_MAP[id]) APAH_IMG_MAP[id] = [];
                        APAH_IMG_MAP[id].push(filename);
                    }
                });
                console.log("Image Index Map Ready:", Object.keys(APAH_IMG_MAP).length, "items");
            } else {
                console.warn("img-list.js is not loaded or imageFiles array is missing.");
            }
        }

        // 初始化地球
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .showAtmosphere(true)
            .atmosphereColor('#4ca5ff')
            .atmosphereAltitude(0.12)
            .pointColor(() => '#fff')
            .pointRadius(0.8)
            .pointAltitude(0.01)
            .onPointClick(d => focusOnArtwork(d));

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.8;
        world.pointOfView({ altitude: 2.2 });

        // 初始化数据
        initializeImageMap();

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                APAH_DATA = data;
                world.pointsData(APAH_DATA);
            })
            .catch(err => console.error("Data Load Error:", err));

        // 核心逻辑：精准匹配图片
        function focusOnArtwork(d) {
            document.body.classList.add('card-open');
            world.controls().autoRotate = false;
            
            world.pointOfView({ 
                lat: d.lat - 5, 
                lng: d.lng + 25, 
                altitude: 0.7 
            }, 1800);
            
            const imgEl = document.getElementById('card-img');
            
            // 从预处理好的 Map 中直接拿文件名
            const matches = APAH_IMG_MAP[d.id];
            
            if (matches && matches.length > 0) {
                // 如果该编号有多个图，默认加载第一个
                imgEl.src = `img/${matches[0]}`;
                console.log(`Found image in index: ${matches[0]}`);
            } else {
                // 如果索引里没有，尝试最后的降级方案
                const paddedId = String(d.id).padStart(3, '0');
                imgEl.src = `img/${paddedId}.jpg`; 
                console.warn(`No index match for ID ${d.id}, trying fallback.`);
            }

            imgEl.onerror = function() {
                this.src = 'https://via.placeholder.com/800x600?text=Image+Missing';
                this.onerror = null;
            };

            document.getElementById('card-title').innerText = d.title;
            document.getElementById('card-subtitle').innerText = `${d.location} • ${d.date}`;
            document.getElementById('card-detail').innerText = d.description;
            document.getElementById('card').classList.add('active');
        }

        function closeCard() {
            document.body.classList.remove('card-open');
            document.getElementById('card').classList.remove('active');
            
            const isExplore = document.getElementById('timeline-view').style.display !== 'block';
            if (isExplore) {
                world.controls().autoRotate = true;
                world.pointOfView({ lat: 20, altitude: 2.2 }, 1500);
            }
        }

        function switchMode(mode) {
            const timelineView = document.getElementById('timeline-view');
            const globeView = document.getElementById('globeViz');
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            if (mode === 'timeline') {
                document.getElementById('nav-timeline').classList.add('active');
                timelineView.style.display = 'block';
                globeView.style.visibility = 'hidden';
                renderTimeline();
                world.controls().autoRotate = false;
            } else {
                document.getElementById('nav-explore').classList.add('active');
                timelineView.style.display = 'none';
                globeView.style.visibility = 'visible';
                world.controls().autoRotate = true;
            }
            closeCard();
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-content');
            container.innerHTML = APAH_DATA.map(d => `
                <div class="timeline-item" onclick="jumpFromTimeline(${d.id})">
                    <div class="timeline-dot"></div>
                    <div style="font-size: 11px; color: var(--apple-blue); font-weight: 700; margin-bottom: 8px;">${d.date}</div>
                    <div style="font-size: 24px; font-weight: 700; letter-spacing: -0.5px;">${d.title}</div>
                    <div style="opacity: 0.4; font-size: 13px; margin-top: 4px;">${d.location}</div>
                </div>
            `).join('');
        }

        function jumpFromTimeline(id) {
            const target = APAH_DATA.find(a => a.id === id);
            if (target) {
                switchMode('explore');
                setTimeout(() => focusOnArtwork(target), 300);
            }
        }

        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(window.innerHeight);
        });

        const renderer = world.renderer();
        if (renderer) renderer.setPixelRatio(window.devicePixelRatio);
    </script>
</body>
</html>
