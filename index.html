<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art History 250 Explorer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-globe@2.24.13/dist/three-globe.min.js"></script>

    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }

        /* Apple-style Glassmorphism UI */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            display: flex;
            gap: 20px;
        }

        nav a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; opacity: 0.8; }
        nav a:hover { opacity: 1; }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        #globe-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <nav>
        <a href="#">GLOBE</a>
        <a href="#">TIMELINE</a>
        <a href="#">COLLECTION</a>
    </nav>

    <div id="loading">Initializing 3D Environment...</div>
    <div id="globe-container"></div>

    <script>
        const container = document.getElementById('globe-container');

// 1. 初始化渲染器
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

// 2. 初始化场景
const scene = new THREE.Scene();

// 3. 初始化相机 - 调整视角
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
// 把 400 改小（比如 250），地球就会看起来很大，占满半个屏幕
camera.position.z = 250; 

// 4. 【关键】引入控制器，让鼠标可以拖动和缩放
// 我们需要动态加载轨道控制器脚本
const script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/controls/OrbitControls.js';
script.onload = () => {
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // 增加阻尼感，让旋转更平滑
    controls.dampingFactor = 0.05;
};
document.head.appendChild(script);

// 5. 创建地球
const Globe = new ThreeGlobe()
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png');

// 测试点位数据
const testData = [
    { lat: -27.95, lng: 16.73, name: '001: Apollo 11 stones' },
    { lat: 45.04, lng: 1.17, name: '002: Lascaux Caves' },
    { lat: 30.27, lng: 120.15, name: '007: Jade Cong' }
];

Globe.pointsData(testData)
    .pointAltitude(0.05)
    .pointColor(() => '#00f2ff')
    .pointRadius(1.0);

scene.add(Globe);

// 6. 光效
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(1, 1, 1);
scene.add(dirLight);

// 7. 渲染循环
function animate() {
    // 如果你希望自己手动拖动，可以注释掉下面这行自转代码
    // Globe.rotation.y += 0.001; 
    
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

// 隐藏加载状态
setTimeout(() => {
    document.getElementById('status').style.display = 'none';
}, 1000);

animate();

// 窗口适配
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
    </script>
</body>
</html>
