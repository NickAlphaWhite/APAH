<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAH 250 | Immersive Chronicle</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="img-list.js"></script> 
    <style>
        :root { 
            --apple-blue: #007AFF; 
            --apple-red: #FF3B30;
            --apple-gold: #FFD60A;
            --card-w: 66vw; 
            --glass: rgba(10, 10, 12, 0.75);
        }
        
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            color: white; -webkit-font-smoothing: antialiased;
        }

        /* UI Containers */
        #site-header { position: fixed; top: 25px; left: 25px; z-index: 2100; pointer-events: none; }
        #header-title { font-size: 20px; font-weight: 800; letter-spacing: -1.2px; margin: 0; }
        #header-title span { color: var(--apple-blue); }
        #header-subtitle { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; opacity: 0.5; margin-top: 6px; }

        #nav-container { position: fixed; top: 30px; right: 25px; display: flex; gap: 10px; z-index: 2000; }
        .nav-capsule {
            background: rgba(25, 25, 28, 0.5); backdrop-filter: blur(30px) saturate(210%);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 30px;
            padding: 12px 30px; display: flex; gap: 30px; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .nav-item { font-size: 11px; font-weight: 600; letter-spacing: 2px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active, .nav-item:hover { opacity: 1; color: var(--apple-blue); }

        /* Globe & Card View */
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #000; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        body.card-open #globeViz { transform: translateX(-10%); }

        #card {
            position: fixed; right: calc(-1 * var(--card-w)); top: 0; bottom: 0; width: var(--card-w);
            background: var(--glass); backdrop-filter: blur(60px) saturate(210%);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 100px 8% 60px 8%; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); 
            z-index: 1500; display: flex; flex-direction: column; overflow-y: auto; box-sizing: border-box;
        }
        #card.active { right: 0; }
        .close-trigger { position: fixed; top: 40px; right: 40px; cursor: pointer; font-size: 26px; opacity: 0.4; z-index: 3000; }

        /* Assessment View */
        #assessment-view {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0a0a0c; display: none; z-index: 1900; padding: 100px 5% 40px 5%;
            box-sizing: border-box; overflow-y: auto;
        }
        #quiz-container { max-width: 850px; margin: 0 auto; }
        .quiz-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px; padding: 35px; position: relative;
        }
        
        #quiz-img-scroll {
            width: 100%; max-height: 40vh; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px;
            margin-bottom: 25px; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 10px;
            box-sizing: border-box;
        }
        #quiz-img-scroll img { width: 100%; border-radius: 12px; object-fit: contain; }

        /* Inputs Grid */
        .quiz-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .quiz-field {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 14px; color: white; font-size: 14px; outline: none; width: 100%; box-sizing: border-box;
        }
        .quiz-field:focus { border-color: var(--apple-blue); background: rgba(255,255,255,0.1); }
        .full-width { grid-column: span 2; }

        .feedback { text-align: center; margin-bottom: 20px; min-height: 60px; font-size: 13px; line-height: 1.6; }
        .quiz-btn { padding: 14px 30px; border-radius: 25px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .primary-btn { background: var(--apple-blue); color: white; }
        .secondary-btn { background: rgba(255,255,255,0.1); color: white; }
        .quiz-btn-sm { padding: 8px 16px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); background: none; color: white; font-size: 11px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        
        /* Timeline View */
        #timeline-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; z-index: 1800; padding: 140px 10%; box-sizing: border-box; overflow-y: auto; }
        .timeline-container { border-left: 1px solid rgba(255,255,255,0.15); padding-left: 40px; margin-top: 60px; }
        .timeline-item { position: relative; margin-bottom: 60px; cursor: pointer; }
        .timeline-dot { position: absolute; left: -46px; top: 10px; width: 11px; height: 11px; background: var(--apple-blue); border-radius: 50%; }

        .gallery-img { width: 100%; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="site-header">
        <h1 id="header-title">APAH<span>250</span></h1>
        <div id="header-subtitle">Global Art Chronicle</div>
    </div>

    <div id="nav-container">
        <div class="nav-capsule">
            <div id="nav-explore" class="nav-item active" onclick="switchMode('explore')">EXPLORE</div>
            <div id="nav-timeline" class="nav-item" onclick="switchMode('timeline')">CHRONICLE</div>
            <div id="nav-assessment" class="nav-item" onclick="switchMode('assessment')">ASSESSMENT</div>
        </div>
    </div>

    <div id="globeViz" onclick="if(document.body.classList.contains('card-open')) closeCard()"></div>

    <div id="card">
        <div class="close-trigger" onclick="closeCard()">✕</div>
        <div id="card-detail-view">
            <div id="card-img-container"></div>
            <h2 id="card-title" style="font-size:36px; margin:0;"></h2>
            <div id="card-artist" style="font-size:18px; opacity:0.8; margin-top:5px;"></div>
            <div id="card-subtitle" style="color:var(--apple-blue); font-weight:600; text-transform:uppercase; letter-spacing:2px; font-size:13px; margin:15px 0;"></div>
            <p id="card-detail" style="opacity: 0.7; line-height: 1.8;"></p>
        </div>
    </div>

    <div id="timeline-view">
        <h1 style="font-size: 48px; font-weight: 800; margin: 0;">The Chronicle</h1>
        <div id="timeline-content" class="timeline-container"></div>
    </div>

    <div id="assessment-view">
        <div id="quiz-container">
            <div class="quiz-controls-top" style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
                <div style="display: flex; gap: 8px;">
                    <button id="order-btn" class="quiz-btn-sm" onclick="toggleOrderMode()">RANDOM</button>
                    <button id="wrong-mode-btn" class="quiz-btn-sm" onclick="toggleWrongMode()">COLLECTION (0)</button>
                </div>
                <input type="text" id="quiz-search" style="background: rgba(255,255,255,0.08); border: none; border-radius: 15px; padding: 8px 15px; color: white; width: 220px; font-size: 12px;" placeholder="Quick Search & Add..." onkeydown="if(event.key==='Enter') searchAndAdd()">
            </div>

            <div class="quiz-card">
                <div id="quiz-img-scroll"></div>
                
                <div style="text-align: center; margin-bottom: 20px;">
                    <button id="collect-btn" class="quiz-btn-sm" onclick="handleCollection()">+ ADD TO COLLECTION</button>
                </div>

                <div class="quiz-inputs">
                    <input type="text" id="q-title" class="quiz-field full-width" placeholder="Artwork Title">
                    <input type="text" id="q-artist" class="quiz-field" placeholder="Artist / Culture">
                    <input type="text" id="q-date" class="quiz-field" placeholder="Date / Period">
                    <input type="text" id="q-location" class="quiz-field" placeholder="Location / Site">
                    <input type="text" id="q-materials" class="quiz-field" placeholder="Materials / Medium">
                </div>

                <div id="quiz-feedback" class="feedback"></div>

                <div style="display: flex; justify-content: center; gap: 12px;">
                    <button class="quiz-btn secondary-btn" onclick="prevQuestion()">PREVIOUS</button>
                    <button class="quiz-btn primary-btn" onclick="checkAnswer()">SUBMIT</button>
                    <button class="quiz-btn secondary-btn" onclick="nextQuestion()">NEXT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let APAH_DATA = [];
        let APAH_IMG_MAP = {}; 
        let CURRENT_CLUSTERS = {}; 
        
        let quizHistory = [];
        let quizIndex = -1;
        let currentQuizItem = null;
        let wrongCollection = JSON.parse(localStorage.getItem('apah_wrong_v2') || '[]');
        let isRandomMode = true;
        let isWrongOnlyMode = false;
        let sequenceIndex = -1;

        const isMobile = window.innerWidth < 768;

        function initializeImageMap() {
            if (typeof imageFiles !== 'undefined') {
                imageFiles.forEach(filename => {
                    const match = filename.match(/^(\d+)/);
                    if (match) {
                        const id = parseInt(match[1]);
                        if (!APAH_IMG_MAP[id]) APAH_IMG_MAP[id] = [];
                        APAH_IMG_MAP[id].push(filename);
                    }
                });
            }
        }

        // 初始化 Globe，点位半径固定
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .showAtmosphere(true)
            .atmosphereColor('#4ca5ff')
            .pointColor(() => '#fff')
            .pointRadius(isMobile ? 1.5 : 0.8)
            .onPointClick((d, event) => { event.stopPropagation(); handlePointClick(d); });

        world.controls().autoRotate = true;

        initializeImageMap();
        fetch('data.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                APAH_DATA = data;
                APAH_DATA.forEach(artwork => {
                    const key = `${artwork.lat.toFixed(1)}-${artwork.lng.toFixed(1)}`;
                    if (!CURRENT_CLUSTERS[key]) CURRENT_CLUSTERS[key] = [];
                    CURRENT_CLUSTERS[key].push(artwork);
                });
                world.pointsData(Object.values(CURRENT_CLUSTERS).map(c => c[0]));
                updateWrongCount();
            });

        function switchMode(mode) {
            document.getElementById('timeline-view').style.display = 'none';
            document.getElementById('assessment-view').style.display = 'none';
            document.getElementById('globeViz').style.visibility = 'hidden';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            if (mode === 'timeline') {
                document.getElementById('timeline-view').style.display = 'block';
                document.getElementById('nav-timeline').classList.add('active');
                renderTimeline();
            } else if (mode === 'assessment') {
                document.getElementById('assessment-view').style.display = 'block';
                document.getElementById('nav-assessment').classList.add('active');
                if (!currentQuizItem) nextQuestion();
            } else {
                document.getElementById('globeViz').style.visibility = 'visible';
                document.getElementById('nav-explore').classList.add('active');
                world.controls().autoRotate = true;
            }
            closeCard();
        }

        function nextQuestion() {
            if (quizIndex < quizHistory.length - 1) displayQuiz(quizHistory[++quizIndex]);
            else {
                const item = getNextArtwork();
                quizHistory.push(item); quizIndex++;
                displayQuiz(item);
            }
        }

        function prevQuestion() {
            if (quizIndex > 0) displayQuiz(quizHistory[--quizIndex]);
        }

        function getNextArtwork() {
            let pool = isWrongOnlyMode ? APAH_DATA.filter(d => wrongCollection.includes(d.id)) : APAH_DATA;
            if (pool.length === 0) { isWrongOnlyMode = false; pool = APAH_DATA; updateWrongCount(); }
            if (isRandomMode) return pool[Math.floor(Math.random() * pool.length)];
            sequenceIndex = (sequenceIndex + 1) % pool.length;
            return pool[sequenceIndex];
        }

        function displayQuiz(item) {
            currentQuizItem = item;
            const scrollBox = document.getElementById('quiz-img-scroll');
            scrollBox.innerHTML = '';
            const matches = APAH_IMG_MAP[item.id] || [];
            if (matches.length > 0) {
                matches.sort().forEach(fname => {
                    const img = document.createElement('img');
                    img.src = `img/${fname}`;
                    scrollBox.appendChild(img);
                });
            } else {
                const img = document.createElement('img');
                img.src = `img/${String(item.id).padStart(3, '0')}.jpg`;
                scrollBox.appendChild(img);
            }
            document.querySelectorAll('.quiz-field').forEach(f => f.value = '');
            document.getElementById('quiz-feedback').innerHTML = '';
            scrollBox.scrollTop = 0;
            updateCollectBtn();
        }

        function checkAnswer() {
            const ut = document.getElementById('q-title').value.trim().toLowerCase();
            const feedback = document.getElementById('quiz-feedback');
            const correctTitle = currentQuizItem.title.toLowerCase();

            if (ut && (correctTitle.includes(ut) || ut.includes(correctTitle))) {
                feedback.innerHTML = `<span style="color:var(--apple-blue); font-weight:800; font-size:16px;">CORRECT</span><br>
                    <div style="margin-top:5px; opacity:0.9;"><b>${currentQuizItem.title}</b><br>
                    <small>${currentQuizItem.artist} | ${currentQuizItem.date}</small><br>
                    <small style="color:var(--apple-gold)">${currentQuizItem.location} • ${currentQuizItem.materials}</small></div>`;
            } else {
                feedback.innerHTML = `<span style="color:var(--apple-red); font-weight:800; font-size:16px;">REVIEW NEEDED</span><br>
                    <div style="margin-top:5px; opacity:0.9;"><b>Answer: ${currentQuizItem.title}</b><br>
                    <small>${currentQuizItem.location} • ${currentQuizItem.materials}</small></div>`;
                if (!wrongCollection.includes(currentQuizItem.id)) { wrongCollection.push(currentQuizItem.id); saveCollection(); }
            }
        }

        function handleCollection() {
            const idx = wrongCollection.indexOf(currentQuizItem.id);
            if (idx > -1) wrongCollection.splice(idx, 1);
            else wrongCollection.push(currentQuizItem.id);
            saveCollection(); updateCollectBtn();
        }

        function saveCollection() { localStorage.setItem('apah_wrong_v2', JSON.stringify(wrongCollection)); updateWrongCount(); }

        function updateWrongCount() {
            const btn = document.getElementById('wrong-mode-btn');
            btn.innerText = `COLLECTION (${wrongCollection.length})`;
            btn.style.color = isWrongOnlyMode ? 'var(--apple-gold)' : 'white';
            btn.style.borderColor = isWrongOnlyMode ? 'var(--apple-gold)' : 'rgba(255,255,255,0.2)';
        }

        function updateCollectBtn() {
            const btn = document.getElementById('collect-btn');
            const isCollected = wrongCollection.includes(currentQuizItem.id);
            btn.innerText = isCollected ? "− REMOVE FROM COLLECTION" : "+ ADD TO COLLECTION";
            btn.style.color = isCollected ? 'var(--apple-red)' : 'var(--apple-blue)';
            btn.style.borderColor = isCollected ? 'var(--apple-red)' : 'var(--apple-blue)';
        }

        function toggleOrderMode() { isRandomMode = !isRandomMode; document.getElementById('order-btn').innerText = isRandomMode ? "RANDOM" : "SEQUENTIAL"; sequenceIndex = -1; }
        function toggleWrongMode() { isWrongOnlyMode = !isWrongOnlyMode; updateWrongCount(); quizHistory = []; quizIndex = -1; nextQuestion(); }
        function searchAndAdd() {
            const val = document.getElementById('quiz-search').value.toLowerCase();
            const found = APAH_DATA.find(d => d.title.toLowerCase().includes(val));
            if (found && !wrongCollection.includes(found.id)) { wrongCollection.push(found.id); saveCollection(); alert("Added to Collection: " + found.title); }
            document.getElementById('quiz-search').value = '';
        }

        function handlePointClick(d) {
            const key = `${d.lat.toFixed(1)}-${d.lng.toFixed(1)}`;
            const artworks = CURRENT_CLUSTERS[key];
            if (!artworks) return;
            document.body.classList.add('card-open');
            world.controls().autoRotate = false;
            world.pointOfView({ lat: d.lat - 5, lng: d.lng + (isMobile ? 0 : 25), altitude: 0.7 }, 1800);
            showDetailView(artworks[0]);
        }

        function showDetailView(d) {
            document.getElementById('card-detail-view').classList.remove('hidden');
            const container = document.getElementById('card-img-container');
            container.innerHTML = '';
            const matches = APAH_IMG_MAP[d.id] || [];
            (matches.length ? matches : [`${String(d.id).padStart(3, '0')}.jpg`]).forEach(fname => {
                const img = document.createElement('img'); img.src = `img/${fname}`; img.className = 'gallery-img'; container.appendChild(img);
            });
            document.getElementById('card-title').innerText = d.title;
            document.getElementById('card-artist').innerText = d.artist || "Unknown";
            document.getElementById('card-subtitle').innerText = `${d.location} • ${d.date}`;
            document.getElementById('card-detail').innerHTML = `<b>Materials:</b> ${d.materials || 'N/A'}<br><br>${d.description}`;
            document.getElementById('card').classList.add('active');
            document.getElementById('card').scrollTop = 0;
        }

        function closeCard() { document.body.classList.remove('card-open'); document.getElementById('card').classList.remove('active'); if (document.getElementById('nav-explore').classList.contains('active')) world.controls().autoRotate = true; }

        function renderTimeline() {
            document.getElementById('timeline-content').innerHTML = APAH_DATA.map(d => `
                <div class="timeline-item" onclick="jumpFromTimeline(${d.id})">
                    <div class="timeline-dot"></div>
                    <div style="font-size:11px; color:var(--apple-blue); font-weight:700;">${d.date}</div>
                    <div style="font-size:22px; font-weight:700;">${d.title}</div>
                </div>`).join('');
        }

        function jumpFromTimeline(id) {
            const target = APAH_DATA.find(a => a.id === id);
            if (target) {
                switchMode('explore');
                world.pointOfView({ lat: target.lat - 5, lng: target.lng + 25, altitude: 0.7 }, 1800);
                setTimeout(() => showDetailView(target), 300);
            }
        }

        window.addEventListener('resize', () => { world.width(window.innerWidth); world.height(window.innerHeight); });
    </script>
</body>
</html>
