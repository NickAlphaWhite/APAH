<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art History 250 Explorer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-globe@2.24.13/dist/three-globe.min.js"></script>

    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }

        /* Apple-style Glassmorphism UI */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            display: flex;
            gap: 20px;
        }

        nav a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; opacity: 0.8; }
        nav a:hover { opacity: 1; }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        #globe-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <nav>
        <a href="#">GLOBE</a>
        <a href="#">TIMELINE</a>
        <a href="#">COLLECTION</a>
    </nav>

    <div id="loading">Initializing 3D Environment...</div>
    <div id="globe-container"></div>

    <script>
        // --- 1. SETTINGS ---
        const container = document.getElementById('globe-container');

        // --- 2. INITIALIZE THREE.JS SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        camera.position.z = 400;

        // --- 3. CREATE THE GLOBE ---
        // Using high-quality textures from Three-Globe's own assets
        const Globe = new ThreeGlobe()
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png');

        // --- 4. HARDCODED TEST DATA (No data.json needed for now) ---
        const testData = [
            { lat: -27.95, lng: 16.73, label: '001: Apollo 11 stones' },
            { lat: 45.04, lng: 1.17, label: '002: Lascaux Caves' },
            { lat: 30.27, lng: 120.15, label: '007: Jade Cong' }
        ];

        Globe.pointsData(testData)
            .pointAltitude(0.05)
            .pointColor(() => '#00f2ff') // Neon Blue
            .pointRadius(0.8);

        scene.add(Globe);

        // --- 5. LIGHTING ---
        scene.add(new THREE.AmbientLight(0xbbbbbb, 0.7));
        const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dLight.position.set(1, 1, 1);
        scene.add(dLight);

        // --- 6. ANIMATION LOOP ---
        function animate() {
            Globe.rotation.y += 0.0015; // Slow rotation
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // Hide loading text once rendering starts
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 1500);

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
