<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAH 250 | Master Mode</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="img-list.js"></script> 
    <style>
        :root { 
            --apple-blue: #007AFF; 
            --apple-red: #FF3B30;
            --apple-gold: #FFD60A;
            --glass: rgba(15, 15, 18, 0.85);
        }
        
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            color: white; -webkit-font-smoothing: antialiased;
        }

        /* 顶部导航 */
        #nav-container { position: fixed; top: 30px; right: 25px; display: flex; gap: 10px; z-index: 2000; }
        .nav-capsule {
            background: rgba(25, 25, 28, 0.6); backdrop-filter: blur(30px) saturate(210%);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            padding: 10px 25px; display: flex; gap: 25px; align-items: center;
        }
        .nav-item { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--apple-blue); }

        /* 地球视图 */
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #000; }

        /* 练习模式视图 */
        #assessment-view {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050505; display: none; z-index: 1900; padding: 100px 5% 40px 5%;
            box-sizing: border-box; overflow-y: auto;
        }
        #quiz-container { max-width: 800px; margin: 0 auto; }

        /* 顶部控制栏 */
        .quiz-controls-top { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .quiz-btn-sm { 
            padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.05); color: white; font-size: 11px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        /* 错题模式激活状态 */
        .quiz-btn-sm.active-mode { 
            background: var(--apple-gold); color: black; border-color: var(--apple-gold); 
            box-shadow: 0 0 15px rgba(255, 214, 10, 0.4);
        }
        .quiz-search-box { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; padding: 8px 18px; color: white; width: 220px; font-size: 12px; outline: none;
        }

        .quiz-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px; padding: 30px;
        }

        /* 图片滚动容器 */
        #quiz-img-scroll {
            width: 100%; max-height: 40vh; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px;
            margin-bottom: 20px; background: #000; border-radius: 16px; padding: 10px;
            box-sizing: border-box; scroll-behavior: smooth;
        }
        #quiz-img-scroll img { width: 100%; border-radius: 8px; }

        /* 输入框布局 */
        .quiz-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .quiz-field {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 14px; color: white; font-size: 15px; outline: none; width: 100%; box-sizing: border-box;
        }
        .quiz-field:focus { border-color: var(--apple-blue); }
        .full-width { grid-column: span 2; }

        .feedback { text-align: center; margin: 15px 0; min-height: 50px; }
        .quiz-btn-main { padding: 14px 30px; border-radius: 25px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .primary { background: var(--apple-blue); color: white; }
        .secondary { background: rgba(255,255,255,0.1); color: white; }

        /* 收藏按钮样式 */
        #collect-btn { transition: 0.3s; border-width: 1px; border-style: solid; background: transparent; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="nav-container">
        <div class="nav-capsule">
            <div id="nav-explore" class="nav-item active" onclick="switchMode('explore')">EXPLORE</div>
            <div id="nav-assessment" class="nav-item" onclick="switchMode('assessment')">ASSESSMENT</div>
        </div>
    </div>

    <div id="globeViz"></div>

    <div id="assessment-view">
        <div id="quiz-container">
            <div class="quiz-controls-top">
                <div style="display: flex; gap: 10px;">
                    <button id="order-btn" class="quiz-btn-sm" onclick="toggleOrderMode()">RANDOM</button>
                    <button id="wrong-mode-btn" class="quiz-btn-sm" onclick="toggleWrongMode()">COLLECTION (0)</button>
                </div>
                <input type="text" id="quiz-search" class="quiz-search-box" placeholder="Search & Add..." onkeydown="if(event.key==='Enter') searchAndAdd()">
            </div>

            <div class="quiz-card">
                <div id="quiz-img-scroll"></div>
                
                <div style="text-align: center; margin-bottom: 20px;">
                    <button id="collect-btn" class="quiz-btn-sm" onclick="handleCollection()">+ ADD TO COLLECTION</button>
                </div>

                <div class="quiz-inputs">
                    <input type="text" id="q-title" class="quiz-field full-width" placeholder="Artwork Title">
                    <input type="text" id="q-artist" class="quiz-field" placeholder="Artist / Culture">
                    <input type="text" id="q-date" class="quiz-field" placeholder="Date / Period">
                    <input type="text" id="q-materials" class="quiz-field full-width" placeholder="Materials / Medium">
                </div>

                <div id="quiz-feedback" class="feedback"></div>

                <div style="display: flex; justify-content: center; gap: 12px;">
                    <button class="quiz-btn-main secondary" onclick="prevQuestion()">PREVIOUS</button>
                    <button class="quiz-btn-main primary" onclick="checkAnswer()">SUBMIT</button>
                    <button class="quiz-btn-main secondary" onclick="nextQuestion()">NEXT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let APAH_DATA = [];
        let APAH_IMG_MAP = {}; 
        
        let quizHistory = [];   // 历史足迹
        let quizIndex = -1;     // 历史当前位置
        let currentQuizItem = null;
        let wrongCollection = JSON.parse(localStorage.getItem('apah_collection_v3') || '[]');
        
        let isRandomMode = true;
        let isWrongOnlyMode = false; // 是否开启“仅练习错题”模式
        let sequenceIndex = -1;

        // 初始化图片映射
        function initializeImageMap() {
            if (typeof imageFiles !== 'undefined') {
                imageFiles.forEach(f => {
                    const id = parseInt(f.match(/^(\d+)/)?.[1]);
                    if (id) { if (!APAH_IMG_MAP[id]) APAH_IMG_MAP[id] = []; APAH_IMG_MAP[id].push(f); }
                });
            }
        }

        // 初始化地球
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .pointColor(() => '#fff').pointRadius(0.8);

        // 加载数据
        initializeImageMap();
        fetch('data.json').then(res => res.json()).then(data => {
            APAH_DATA = data;
            updateWrongCount();
        });

        // 切换模式
        function switchMode(mode) {
            document.getElementById('assessment-view').style.display = (mode === 'assessment' ? 'block' : 'none');
            document.getElementById('globeViz').style.visibility = (mode === 'explore' ? 'visible' : 'hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + mode).classList.add('active');
            
            if (mode === 'assessment' && !currentQuizItem) nextQuestion();
        }

        // --- 核心逻辑：获取下一题 ---
        function getNextArtwork() {
            let pool = [];
            
            if (isWrongOnlyMode) {
                // 仅从收藏夹选题
                pool = APAH_DATA.filter(d => wrongCollection.includes(d.id));
                if (pool.length === 0) {
                    alert("Collection is empty! Switching to All Mode.");
                    isWrongOnlyMode = false;
                    document.getElementById('wrong-mode-btn').classList.remove('active-mode');
                    pool = APAH_DATA;
                }
            } else {
                // 从全库选题
                pool = APAH_DATA;
            }

            if (isRandomMode) {
                return pool[Math.floor(Math.random() * pool.length)];
            } else {
                sequenceIndex = (sequenceIndex + 1) % pool.length;
                return pool[sequenceIndex];
            }
        }

        function nextQuestion() {
            // 如果你在查看历史（点过PREVIOUS），则向后移
            if (quizIndex < quizHistory.length - 1) {
                quizIndex++;
                displayQuiz(quizHistory[quizIndex]);
            } else {
                // 否则生成新题
                const item = getNextArtwork();
                quizHistory.push(item);
                quizIndex++;
                displayQuiz(item);
            }
        }

        function prevQuestion() {
            if (quizIndex > 0) {
                quizIndex--;
                displayQuiz(quizHistory[quizIndex]);
            }
        }

        function displayQuiz(item) {
            currentQuizItem = item;
            const scrollBox = document.getElementById('quiz-img-scroll');
            scrollBox.innerHTML = '';
            
            const imgs = APAH_IMG_MAP[item.id] || [`${String(item.id).padStart(3, '0')}.jpg`];
            imgs.sort().forEach(f => {
                const img = document.createElement('img');
                img.src = `img/${f}`;
                scrollBox.appendChild(img);
            });

            document.querySelectorAll('.quiz-field').forEach(f => f.value = '');
            document.getElementById('quiz-feedback').innerHTML = '';
            scrollBox.scrollTop = 0;
            updateCollectBtnUI();
        }

        function checkAnswer() {
            const ut = document.getElementById('q-title').value.trim().toLowerCase();
            const feedback = document.getElementById('quiz-feedback');
            const correctTitle = currentQuizItem.title.toLowerCase();

            if (ut && (correctTitle.includes(ut) || ut.includes(correctTitle))) {
                feedback.innerHTML = `<b style="color:var(--apple-blue)">CORRECT!</b><br><small>${currentQuizItem.title}</small>`;
            } else {
                feedback.innerHTML = `<b style="color:var(--apple-red)">INCORRECT</b><br><small>Answer: ${currentQuizItem.title}</small>`;
                // 回答错误自动加入收藏
                if (!wrongCollection.includes(currentQuizItem.id)) {
                    wrongCollection.push(currentQuizItem.id);
                    saveCollection();
                }
            }
        }

        // --- 收藏功能 ---
        function handleCollection() {
            const id = currentQuizItem.id;
            const idx = wrongCollection.indexOf(id);
            if (idx > -1) wrongCollection.splice(idx, 1);
            else wrongCollection.push(id);
            saveCollection();
            updateCollectBtnUI();
        }

        function saveCollection() {
            localStorage.setItem('apah_collection_v3', JSON.stringify(wrongCollection));
            updateWrongCount();
        }

        function updateWrongCount() {
            const btn = document.getElementById('wrong-mode-btn');
            btn.innerText = `COLLECTION (${wrongCollection.length})`;
        }

        function updateCollectBtnUI() {
            const btn = document.getElementById('collect-btn');
            const isCollected = wrongCollection.includes(currentQuizItem.id);
            btn.innerText = isCollected ? "− REMOVE FROM COLLECTION" : "+ ADD TO COLLECTION";
            btn.style.color = isCollected ? 'var(--apple-red)' : 'var(--apple-blue)';
            btn.style.borderColor = isCollected ? 'var(--apple-red)' : 'var(--apple-blue)';
        }

        // --- 模式切换 ---
        function toggleOrderMode() {
            isRandomMode = !isRandomMode;
            document.getElementById('order-btn').innerText = isRandomMode ? "RANDOM" : "SEQUENTIAL";
            sequenceIndex = -1;
            quizHistory = []; quizIndex = -1; // 切换模式建议重置足迹
            nextQuestion();
        }

        function toggleWrongMode() {
            if (wrongCollection.length === 0 && !isWrongOnlyMode) {
                alert("Please add some artworks to your collection first!");
                return;
            }
            isWrongOnlyMode = !isWrongOnlyMode;
            const btn = document.getElementById('wrong-mode-btn');
            
            if (isWrongOnlyMode) {
                btn.classList.add('active-mode');
            } else {
                btn.classList.remove('active-mode');
            }
            
            // 切换模式后，立刻加载该模式下的新题
            quizHistory = []; quizIndex = -1;
            nextQuestion();
        }

        function searchAndAdd() {
            const val = document.getElementById('quiz-search').value.toLowerCase();
            const found = APAH_DATA.find(d => d.title.toLowerCase().includes(val));
            if (found) {
                if (!wrongCollection.includes(found.id)) {
                    wrongCollection.push(found.id);
                    saveCollection();
                    alert(`Added to Collection: ${found.title}`);
                }
            } else alert("Artwork not found.");
            document.getElementById('quiz-search').value = '';
        }
    </script>
</body>
</html>
