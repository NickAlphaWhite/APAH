<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Art History 250 Explorer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-globe@2.24.13/dist/three-globe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 10px 25px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100; display: flex; gap: 20px;
        }
        nav a { color: white; text-decoration: none; font-size: 13px; font-weight: 500; opacity: 0.6; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.5; }
        #globe-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <nav>
        <a href="#">GLOBE</a>
        <a href="#">TIMELINE</a>
        <a href="#">COLLECTION</a>
    </nav>

    <div id="loading">LOADING GEOGRAPHY...</div>
    <div id="globe-container"></div>

    <script>
        const container = document.getElementById('globe-container');

        // 1. 初始化场景
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        
        // --- 核心：地平线视角设置 ---
        // 降低相机高度并靠近地球，复刻你上传图片的视角
        camera.position.set(0, 160, 160); 
        camera.lookAt(0, 0, 0);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 150; // 限制缩放，防止地球变太小
        controls.maxDistance = 300;
        controls.maxPolarAngle = Math.PI * 0.5; // 禁止看到南极，保持地平线在下方的视角

        // 2. 创建地球
        const Globe = new ThreeGlobe().showAtmosphere(true);

        // --- 修复点：使用更稳定的 GeoJSON 链接 ---
        // 我们改用 Vasturiano (库作者) 仓库下的稳定路径
        const GEO_URL = 'https://raw.githubusercontent.com/vasturiano/three-globe/master/example/country-polygons/ne_110m_admin_0_countries.geojson';

        fetch(GEO_URL)
            .then(res => {
                if (!res.ok) throw new Error('Fetch failed');
                return res.json();
            })
            .then(countries => {
                Globe.hexPolygonsData(countries.features)
                    .hexPolygonResolution(3)
                    .hexPolygonMargin(0.3)
                    .hexPolygonColor(() => 'rgba(255, 255, 255, 0.4)');
                
                document.getElementById('loading').style.display = 'none';
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loading').innerText = "Data load error, retrying...";
            });

        // 作品点位
        const testPoints = [
            { lat: 30.27, lng: 120.15, name: '007: Jade Cong' },
            { lat: 37.97, lng: 23.72, name: '035: Acropolis' }
        ];

        Globe.pointsData(testPoints)
            .pointColor(() => '#ff3b30')
            .pointRadius(0.8);

        scene.add(Globe);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // 3. 渲染循环
        function animate() {
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
